services:
  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - 8041:3000
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://hwhub:***@db:5432/hwhub
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      WHATSAPP_CLOUD_TOKEN: ${WHATSAPP_CLOUD_TOKEN:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      TELNYX_API_KEY: ${TELNYX_API_KEY:-}
      PLIVO_AUTH_ID: ${PLIVO_AUTH_ID:-}
      PLIVO_AUTH_TOKEN: ${PLIVO_AUTH_TOKEN:-}
      WOOCOMMERCE_URL: ${WOOCOMMERCE_URL:-}
      WOOCOMMERCE_KEY: ${WOOCOMMERCE_KEY:-}
      WOOCOMMERCE_SECRET: ${WOOCOMMERCE_SECRET:-}
      EASYAPPOINTMENTS_URL: ${EASYAPPOINTMENTS_URL:-}
      EASYAPPOINTMENTS_USER: ${EASYAPPOINTMENTS_USER:-}
      EASYAPPOINTMENTS_PASSWORD: ${EASYAPPOINTMENTS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hwhub
      POSTGRES_USER: hwhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hwhub -d hwhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
