name: Deploy to Staging (NAS)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-staging-nas
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy a ~/docker/stacks/hwhub-app/
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.NAS_SSH_KEY }}
          SSH_HOST: ${{ secrets.NAS_HOST }}
          SSH_USER: ${{ secrets.NAS_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host target
            HostName ${SSH_HOST}
            User ${SSH_USER}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy en el NAS (git reset + docker up + health check)
        env:
          SHA: ${{ github.sha }}
          DEPLOY_PATH: ~/docker/stacks/hwhub-app
        run: |
          set -euo pipefail
          
          # Copiar script al NAS y ejecutar con variables de entorno inyectadas
          ssh target "cat > /tmp/deploy.sh" < .github/scripts/deploy.sh
          ssh target "GIT_SHA='${SHA}' DEPLOY_PATH='${DEPLOY_PATH}' bash /tmp/deploy.sh" < /dev/null
          ssh target "rm -f /tmp/deploy.sh" < /dev/null || true

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/id_ed25519 ~/.ssh/config
