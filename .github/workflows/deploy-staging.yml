name: Deploy to Staging (NAS)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-staging-nas
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy a ~/docker/stacks/hwhub-app/
    needs: test
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy en el NAS (git pull + docker compose up)
        run: |
          set -euo pipefail
          cd ~/docker/stacks/hwhub-app
          echo "==> Deploy local en NAS"
          echo "==> directorio: $(pwd)"
          
          # 1) Git pull al commit exacto
          echo "==> git fetch + reset"
          git fetch --all --prune 2>&1 | tail -5
          git reset --hard ${{ github.sha }} 2>&1 | tail -3
          
          # 2) Docker compose: build + recreate
          echo "==> docker compose build + up"
          docker compose build --build-arg GIT_SHA=${{ github.sha }} 2>&1 | tail -20
          docker compose up -d --force-recreate --no-deps --remove-orphans app 2>&1 | tail -10
          
          # 3) Health check en puerto 8041: 60 intentos x 3 segundos
          echo "==> health check: http://127.0.0.1:8041/health (60 intentos, 3s cada uno)"
          ok=0
          for i in $(seq 1 60); do
            health=$(curl -fsS -m 5 http://127.0.0.1:8041/health 2>/dev/null || true)
            if printf '%s' "${health}" | grep -qiE 'ok|healthy|running|"status"' 2>/dev/null; then
              ok=1
              echo "✓ health check PASSED (intento ${i}/60)"
              break
            fi
            if [ $((i % 10)) -eq 0 ] || [ "${i}" -le 3 ]; then
              echo "   intento ${i}/60: esperando health check..."
            fi
            sleep 3
          done
          
          if [ "${ok}" -ne 1 ]; then
            echo "✗ Health check falló tras 60 intentos" >&2
            docker compose logs --tail=80 app >&2
            exit 1
          fi
          
          echo ""
          echo "✓ Deploy exitoso en commit ${{ github.sha }}"
          echo "  URL: http://127.0.0.1:8041/"
